<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Профиль - Тюряга</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    /* Берем цвет фона из темы телеграма, если есть, иначе наш темный */
    background: var(--tg-theme-bg-color, #121212);
    display: flex;
    justify-content: center;
    overflow-x: hidden; /* Предотвращаем горизонтальную прокрутку из-за меню */
  }

  .prison-profile {
    font-family: 'Arial Black', Impact, sans-serif;
    background: #1a1a1a;
    background-image: repeating-linear-gradient(45deg, #181818 25%, transparent 25%, transparent 75%, #181818 75%, #181818), repeating-linear-gradient(45deg, #181818 25%, #1a1a1a 25%, #1a1a1a 75%, #181818 75%, #181818);
    background-position: 0 0, 10px 10px;
    background-size: 20px 20px;
    color: #e0e0e0;
    width: 100%;
    max-width: 500px;
    /* Убираем внешние отступы для мобильного вида */
    margin: 0;
    border: 4px solid #4a4a4a;
    box-sizing: border-box;
    padding: 20px;
    text-transform: uppercase;
    min-height: 100vh; /* Растягиваем на весь экран */
    padding-top: 70px; /* Добавляем отступ сверху, чтобы контент не перекрывался иконкой меню */
  }

  .header-section {
    display: flex;
    align-items: center;
    border-bottom: 2px dashed #555;
    padding-bottom: 15px;
    margin-bottom: 15px;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border: 3px solid #7a0000;
    border-radius: 4px;
    margin-right: 15px;
    background: #222;
    box-shadow: 0 0 10px rgba(122,0,0,0.5);
    object-fit: cover;
  }

  .info-block {
    flex-grow: 1;
  }

  .info-block h1 {
    margin: 0;
    font-size: 18px;
    color: #ffcc00;
    text-shadow: 2px 2px 2px #000;
    letter-spacing: 1px;
    word-break: break-all;
  }

  .info-block p {
    margin: 5px 0 0;
    font-size: 12px;
    color: #aaa;
  }

  .vip-badge {
    background: #7a0000;
    color: #fff;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 10px;
    vertical-align: middle;
    margin-left: 5px;
    border: 1px solid #ff4444;
  }

  .xp-bar {
    background: #222;
    height: 12px;
    border-radius: 3px;
    margin-top: 8px;
    border: 1px solid #444;
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    background: #ff8c00;
    height: 100%;
    box-shadow: inset 0 0 5px rgba(255,255,255,0.3);
    transition: width 0.5s ease-in-out;
  }

  .stats-container, .resources-container, .weapons-container {
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid #333;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 4px;
  }

  .section-title {
    font-size: 16px;
    color: #ff4444;
    margin-top: 0;
    margin-bottom: 10px;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
    text-shadow: 1px 1px 1px #000;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 10px;
  }

  .stat-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    border-bottom: 1px dotted #333;
    padding-bottom: 2px;
  }

  .stat-val {
    color: #ffcc00;
    font-weight: bold;
    text-shadow: 1px 1px 1px #000;
  }

  /* Стили для иконки меню */
  .hamburger-icon {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10001; /* Выше всего */
    cursor: pointer;
    padding: 5px;
    background: #1a1a1a;
    border: 2px solid #4a4a4a;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 20px;
    width: 25px;
  }
  .hamburger-icon span {
    display: block;
    height: 3px;
    width: 100%;
    background-color: #ffcc00;
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  /* Стили для контейнера меню */
  .menu-container {
    position: fixed;
    top: 0;
    left: -280px; /* Изначально скрыто */
    width: 280px;
    height: 100vh;
    background-color: rgba(26, 26, 26, 0.95); /* Немного прозрачности для эффекта */
    z-index: 10000; /* Чуть ниже иконки */
    color: #e0e0e0;
    transition: left 0.3s ease;
    padding: 60px 20px 20px; /* Отступ сверху для иконки, затем обычные */
    box-sizing: border-box;
    border-right: 4px solid #4a4a4a;
    font-family: 'Arial Black', Impact, sans-serif;
    text-transform: uppercase;
  }
  .menu-container.show {
    left: 0;
  }

  .menu-header {
    font-size: 20px;
    color: #ffcc00;
    text-shadow: 2px 2px 2px #000;
    margin-bottom: 30px;
    border-bottom: 2px dashed #555;
    padding-bottom: 10px;
  }

  .menu-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .menu-item {
    margin-bottom: 15px;
  }
  .menu-link {
    text-decoration: none;
    color: #e0e0e0;
    font-size: 16px;
    display: block;
    padding: 5px 0;
    transition: color 0.2s ease;
  }
  .menu-link:hover {
    color: #ffcc00;
  }
  .menu-link.active {
    color: #ff8c00;
    border-bottom: 2px solid #ff8c00;
  }
</style>
</head>
<body>

<div class="hamburger-icon" id="hamburger-icon">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="menu-container" id="menu-container">
  <div class="menu-header">НАВИГАЦИЯ</div>
  <ul class="menu-list">
    <li class="menu-item"><a href="#" class="menu-link active">Профиль</a></li>
    <li class="menu-item"><a href="#" class="menu-link">Боссы</a></li>
    <li class="menu-item"><a href="#" class="menu-link">Двор</a></li>
    <li class="menu-item"><a href="#" class="menu-link">Ходки/Мастера</a></li>
  </ul>
</div>

<div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffcc00; font-family: 'Arial Black', Impact, sans-serif; text-transform: uppercase;">
  <h2 style="margin: 0; font-size: 24px; text-shadow: 2px 2px 2px #000; letter-spacing: 2px;">ТЮРЯГА</h2>
  <p style="color: #aaa; font-size: 12px; margin-top: 5px;">Проверка авторитета...</p>
  <div style="width: 200px; height: 12px; background: #222; border: 2px solid #444; margin-top: 20px; border-radius: 4px; overflow: hidden;">
    <div id="loading-bar" style="width: 0%; height: 100%; background: #7a0000; transition: width 1.5s ease-in-out;"></div>
  </div>
</div>

<div class="prison-profile">
  <div class="header-section">
    <img id="avatar" class="avatar" src="" alt="Аватар" onerror="this.src='https://via.placeholder.com/100/222/7a0000?text=ЗЕК'">
    <div class="info-block">
      <h1><span id="nickname">Имя</span> <span id="vip-badge" class="vip-badge" style="display: none;">ВОРОВСКОЙ</span></h1>
      <p>Игрок: <span id="playerId" class="stat-val">#0</span> | TG: <span id="userId" class="stat-val">0</span></p>
      <p>Уровень: <span id="level" class="stat-val">0</span></p>
      <div id="xp-container" class="xp-bar" title="Опыт: 0 / 0"><div id="xp-fill" class="xp-fill" style="width: 0%;"></div></div>
    </div>
  </div>

  <div class="stats-container">
    <h2 class="section-title">Характеристики</h2>
    <div class="grid-2">
      <div class="stat-item"><span>Авторитет:</span> <span id="authority" class="stat-val">0</span></div>
      <div class="stat-item"><span>Бицуха:</span> <span id="biceps" class="stat-val">0</span></div>
      <div class="stat-item"><span>Энергия:</span> <span id="energy" class="stat-val">0 / 0</span></div>
    </div>
  </div>

  <div class="weapons-container">
    <h2 class="section-title">Урон</h2>
    <div class="grid-2">
      <div class="stat-item"><span>Яд:</span> <span id="poison" class="stat-val">0</span></div>
      <div class="stat-item"><span>Огнестрел:</span> <span id="gunshot" class="stat-val">0</span></div>
      <div class="stat-item"><span>Холодное:</span> <span id="knife" class="stat-val">0</span></div>
    </div>
  </div>

  <div class="resources-container">
    <h2 class="section-title">Нычка</h2>
    <div class="grid-2">
      <div class="stat-item"><span>Папиросы:</span> <span id="cigarettes" class="stat-val">0</span></div>
      <div class="stat-item"><span>Рубли:</span> <span id="rubles" class="stat-val">0</span></div>
      <div class="stat-item"><span>Сахар:</span> <span id="sugar" class="stat-val">0</span></div>
      <div class="stat-item"><span>Чифир:</span> <span id="chefir" class="stat-val">0</span></div>
      <div class="stat-item"><span>Мыло:</span> <span id="soap" class="stat-val">0</span></div>
      <div class="stat-item"><span>Сгущенка:</span> <span id="condensed_milk" class="stat-val">0</span></div>
    </div>
  </div>
</div>

<script>
  // 1. Инициализация Telegram Web App
  const tg = window.Telegram.WebApp;
  tg.expand(); // Разворачиваем на весь экран
  tg.ready();  // Сообщаем телеграму, что приложение готово

  // Логика переключения меню
  const hamburgerIcon = document.getElementById('hamburger-icon');
  const menuContainer = document.getElementById('menu-container');

  hamburgerIcon.addEventListener('click', () => {
    menuContainer.classList.toggle('show');
  });

  // Закрываем меню при клике снаружи
  document.addEventListener('click', (event) => {
    if (!menuContainer.contains(event.target) && event.target !== hamburgerIcon) {
      menuContainer.classList.remove('show');
    }
  });

  // 2. Базовые данные игры (в будущем будешь брать их с сервера)
  const gameData = {
    playerId: 233,
    level: 152,
    currentLevelXp: 468160,
    nextLevelXp: 474300,
    authority: 12729856,
    biceps: 7231,
    energy: 344,
    maxEnergy: 344,
    vpi: { active: true, name: "vorovskoy" },
    user: { photo_url: "https://cdn.tuyraga.ru/avatars/233.jpg", first_name: "Черных С Д", id: 6044198662 },
    combatStats: { poison: 5663, gunshot: 3155, knife: 1609 },
    currencies: { cigarettes: 62690, rubles: 41378, sugar: 4486674, chefir: 1455, soap: 384, condensed_milk: 53 }
  };

  // 3. Подтягиваем реальные данные пользователя из Telegram (если открыто в боте)
  if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
    gameData.user.first_name = tg.initDataUnsafe.user.first_name;
    gameData.user.id = tg.initDataUnsafe.user.id;
  }

  // Функция для форматирования чисел (1 000 000)
  const formatNum = (num) => new Intl.NumberFormat('ru-RU').format(num);

  // 4. Отрисовка профиля
  function renderProfile(data) {
    document.getElementById('avatar').src = data.user.photo_url;
    document.getElementById('nickname').textContent = data.user.first_name;
    document.getElementById('playerId').textContent = '#' + data.playerId;
    document.getElementById('userId').textContent = data.user.id;
    document.getElementById('level').textContent = data.level;

    if (data.vpi && data.vpi.active) {
      document.getElementById('vip-badge').style.display = 'inline-block';
    }

    const xpPercent = (data.currentLevelXp / data.nextLevelXp) * 100;
    setTimeout(() => { document.getElementById('xp-fill').style.width = xpPercent + '%'; }, 100);
    
    document.getElementById('authority').textContent = formatNum(data.authority);
    document.getElementById('biceps').textContent = formatNum(data.biceps);
    document.getElementById('energy').textContent = `${data.energy} / ${data.maxEnergy}`;

    document.getElementById('poison').textContent = formatNum(data.combatStats.poison);
    document.getElementById('gunshot').textContent = formatNum(data.combatStats.gunshot);
    document.getElementById('knife').textContent = formatNum(data.combatStats.knife);

    document.getElementById('cigarettes').textContent = formatNum(data.currencies.cigarettes);
    document.getElementById('rubles').textContent = formatNum(data.currencies.rubles);
    document.getElementById('sugar').textContent = formatNum(data.currencies.sugar);
    document.getElementById('chefir').textContent = formatNum(data.currencies.chefir);
    document.getElementById('soap').textContent = formatNum(data.currencies.soap);
    document.getElementById('condensed_milk').textContent = formatNum(data.currencies.condensed_milk);
  }

  // Запускаем отрисовку профиля
  renderProfile(gameData);

  // Анимация полоски загрузки и скрытие экрана загрузки
  setTimeout(() => {
    document.getElementById('loading-bar').style.width = '100%';
  }, 100);

  setTimeout(() => {
    const loader = document.getElementById('loading-screen');
    loader.style.opacity = '0';
    loader.style.transition = 'opacity 0.4s ease';
    setTimeout(() => loader.style.display = 'none', 400);
  }, 1800);
</script>
</body>
</html>
